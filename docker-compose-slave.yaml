services:
  new-api-slave:
    image: 3305681059/new-api:latest
    container_name: new-api-slave
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./slave-data:/data
      - ./slave-logs:/app/logs
    environment:
      - NODE_TYPE=slave
      # External MySQL 8 DSN. Must point to the same database as the master node.
      - SQL_DSN=db_user:db_password@tcp(10.0.0.10:3306)/new-api?charset=utf8mb4&parseTime=True&loc=Local
      # Replace with the master node's private IP and the same Redis password.
      - REDIS_CONN_STRING=redis://:replace-with-redis-password@10.0.0.20:6379/0
      # Must be identical to the values used on the master node.
      - SESSION_SECRET=replace-with-a-strong-random-string
      - CRYPTO_SECRET=replace-with-the-same-strong-random-string
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - SYNC_FREQUENCY=60
      # Optional:
      # - BATCH_UPDATE_INTERVAL=5
      # - MEMORY_CACHE_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
